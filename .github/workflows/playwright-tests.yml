name: Playwright Pytest Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# --- 1. MUST ADD ACCESS PERMISSION FOR GITHUB PAGES ---
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure Playwright Browsers
      run: |
        playwright install --with-deps chromium

    - name: Run Pytest in Parallel (2 Workers)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
      run: |
        python -m pytest -n 2 -s --alluredir=allure-results

    # --- 2. GENERATE ALLURE REPORT INTO STATIC HTML ---
    - name: Install Allure Commandline
      if: always()
      run: |
        sudo wget https://github.com
        sudo tar -zxvf allure-2.32.0.tgz -C /opt/
        sudo ln -s /opt/allure-2.32.0/bin/allure /usr/bin/allure

    - name: Build Allure Report Web HTML
      if: always()
      run: |
        allure generate allure-results --clean -o allure-report

    # --- 3. UPLOAD & PUBLISH DIRECTLY TO GITHUB PAGES WEB LINK ---
    - name: Setup Pages
      if: always()
      uses: actions/configure-pages@v4

    - name: Upload Artifact to Pages
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'allure-report'

    - name: Deploy Allure Report to GitHub Pages
      if: always()
      id: deployment
      uses: actions/deploy-pages@v4
