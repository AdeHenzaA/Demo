name: Playwright Pytest Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read 
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Ensure Playwright Browser
      run: playwright install chromium

    - name: Run Pytest in Parallel (2 Workers)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
      continue-on-error: true 
      run: |
        python -m pytest -n 2 -s --alluredir=allure-results 
    # --- SISIPI PERINTAH SALIN KATEGORI DI SINI ---
    - name: Copy Custom Categories Configuration
      if: always()
      run: |
        # Buat foldernya jika belum ada (antisipasi jika tes lolos semua dan folder kosong)
        mkdir -p allure-results
        # Salin file kategori ke dalam folder hasil allure
        cp categories.json allure-results/


    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      id: allure-report
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Setup Pages
      if: always()
      uses: actions/configure-pages@v5

    - name: Upload Artifact to Pages
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'allure-history'

    - name: Deploy Allure Report Web
      if: always()
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Send Report Notification to Slack
      if: always()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        # Memeriksa apakah file ada dan berisi teks hasil analisis AI
        if [ -f ai_output.txt ] && grep -q "HASIL ANALISIS REKOMENDASI AI" ai_output.txt; then
          # Membaca seluruh isi file teks secara utuh tanpa pemotongan kaku
          AI_TEXT=$(cat ai_output.txt)
          STATUS_EMOJI="🔴 *TEST AUTOMATION FAILED*"
          COLOR="#FF0000"
        else
          AI_TEXT="Semua skenario pengujian berhasil dilewati dengan sukses tanpa adanya eror. Pertahankan kode Anda!"
          STATUS_EMOJI="🟢 *TEST AUTOMATION PASSED*"
          COLOR="#36a64f"
        fi

        PROJECT_INFO="*Project:* Demo (GitHub Actions)"
        REPORT_LINK="*Allure Report Link:* https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

        # Menggabungkan teks dengan ENTER (\n) secara resmi ke dalam JSON Slack via jq
        PAYLOAD=$(jq -n \
          --arg color "$COLOR" \
          --arg title "$STATUS_EMOJI" \
          --arg p_info "$PROJECT_INFO" \
          --arg r_link "$REPORT_LINK" \
          --arg ai_text "$AI_TEXT" \
          '{
            attachments: [{
              color: $color,
              title: $title,
              text: ($p_info + "\n" + $r_link + "\n\n*🤖 ANALISIS SOLUSI GEMINI AI:*\n" + $ai_text)
            }]
          }')

        curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

        if [ "$COLOR" = "#FF0000" ]; then
          echo "Menandai pipeline GitHub Actions sebagai GAGAL karena ada tes yang tidak lolos."
          exit 1
        fi
          echo "Menandai pipeline GitHub Actions sebagai GAGAL karena ada tes yang tidak lolos."
          exit 1
        fi
